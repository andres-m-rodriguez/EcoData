# Deploy to Azure using Aspire pipelines
name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for dotnet-affected

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Install Tools
        run: |
          dotnet tool install -g aspire.cli --prerelease
          dotnet tool install -g dotnet-affected

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Generate Deploy Mappings
        run: dotnet run scripts/generate-deploy-mappings.cs

      - name: Deploy Affected Services
        env:
          Azure__SubscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ env.AZURE_LOCATION }}
          Azure__ResourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          Parameters__jwt-user-secret-key: ${{ secrets.JWT_USER_SECRET_KEY }}
          Parameters__jwt-sensor-secret-key: ${{ secrets.JWT_SENSOR_SECRET_KEY }}
          Parameters__customDomain: ${{ vars.CUSTOM_DOMAIN }}
          Parameters__certificateName: ${{ vars.CERTIFICATE_NAME }}
        run: dotnet run scripts/deploy-affected.cs -- --from ${{ github.event.before }} --to ${{ github.sha }}

      - name: Configure Custom Domain
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        run: |
          CUSTOM_DOMAIN="${{ vars.CUSTOM_DOMAIN }}"
          RESOURCE_GROUP="${{ env.AZURE_RESOURCE_GROUP }}"

          # Get container app environment name
          ENV_NAME=$(az containerapp env list --resource-group $RESOURCE_GROUP --query "[0].name" -o tsv)

          # Check if hostname exists and get binding type
          BINDING_TYPE=$(az containerapp hostname list --name ecoportal --resource-group $RESOURCE_GROUP --query "[?name=='$CUSTOM_DOMAIN'].bindingType" -o tsv)

          if [ "$BINDING_TYPE" = "SniEnabled" ]; then
            echo "Custom domain $CUSTOM_DOMAIN already configured with SSL"
            exit 0
          fi

          # Add hostname if it doesn't exist
          if [ -z "$BINDING_TYPE" ]; then
            echo "Adding custom domain $CUSTOM_DOMAIN..."
            az containerapp hostname add --name ecoportal --resource-group $RESOURCE_GROUP --hostname $CUSTOM_DOMAIN
          else
            echo "Custom domain exists but SSL is $BINDING_TYPE, re-binding..."
          fi

          # Bind SSL certificate
          echo "Binding SSL certificate..."
          az containerapp hostname bind --name ecoportal --resource-group $RESOURCE_GROUP --hostname $CUSTOM_DOMAIN --environment $ENV_NAME --validation-method CNAME

          echo "Custom domain $CUSTOM_DOMAIN configured with SSL"
